name: Tests

on:
  pull_request:
    types: ["opened", "reopened", "synchronize"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: |
          mise trust mise.toml
          mise install
          uv sync

      - name: Run tests
        run: mise run test
